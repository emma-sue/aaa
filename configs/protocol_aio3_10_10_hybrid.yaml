# Exact optimization/sample schedule of the primary AIO-3 Stage-A trajectory.
# Epochs are zero-based and end_epoch is exclusive.  The four-rank execution
# uses safe micro-batches while retaining these canonical global updates.
hybrid_schedule:
  schema: 1
  index_algorithm: exact_aio3_main_v1
  dataset_size: 137669
  expected_total_steps: 330500
  expected_total_samples: 33034920
  phases:
    - start_epoch: 0
      end_epoch: 55
      micro_batch: 16
      accumulation: 4
      effective_batch: 64
      steps_per_epoch: 2151
      samples_per_epoch: 137664
      sampler: legacy_single_gpu_random_sampler
    - start_epoch: 55
      end_epoch: 240
      micro_batch: 15
      accumulation: 8
      effective_batch: 120
      steps_per_epoch: 1147
      samples_per_epoch: 137640
      sampler: reconstructed_four_rank_distributed_sampler

# The only architectural change relative to the registered 6/14 model is
# decoder-block ownership: D1 owns 10 blocks and D2 owns 10 blocks.
model:
  dim: 48
  matched_dim: 52
  encoder_blocks: [4, 6, 6, 8]
  d1_blocks: [3, 3, 4]
  d2_blocks: [3, 3, 3]
  d2_refinement: 1
  heads: [1, 2, 4, 8]
  expansion: 2.66
