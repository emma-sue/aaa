  schema: 1
  index_algorithm: exact_aio3_main_v1
  dataset_size: 137669
  expected_total_steps: 330500
  expected_total_samples: 33034920
  phases:
    - start_epoch: 0
      end_epoch: 55
      micro_batch: 16
      accumulation: 4
      effective_batch: 64
      steps_per_epoch: 2151
      samples_per_epoch: 137664
      sampler: legacy_single_gpu_random_sampler
    - start_epoch: 55
      end_epoch: 240
      micro_batch: 15
      accumulation: 8
      effective_batch: 120
      steps_per_epoch: 1147
      samples_per_epoch: 137640
      sampler: reconstructed_four_rank_distributed_sampler

